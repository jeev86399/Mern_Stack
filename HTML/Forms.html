<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms

    </title>

    <link rel="stylesheet" href="../CSS/Position.css">
</head>
<body>
    <div class="data" id="app">
    <header>
        <h1>Forms</h1>
    </header>
    <main>
        <form>
            <label>Name :</label>
            <input type="text" name="name" placeholder="Enter your name"><br>
            <label>Email :</label>
            <input type="email" name="email" placeholder="Enter your email"><br>
            <label>Password :</label>
            <input type="password" name="password" placeholder="Enter your password"><br>
            <label>Phone Number </label>
            <input type="number" name="phone" placeholder="Enter your phone number"><br>
            <lable>Gender :</lable>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="female">Female<br>
            <label>Qualification :</label>
            <input type="checkbox" name="qualification" value="10th">10th
            <input type="checkbox" name="qualification" value="12th">12th
            <input type="checkbox" name="qualification" value="Diploma">Diploma
            <input type="checkbox" name="qualification" value="Bachelors">Bachelors
            <br>
            <label>DATE OF BIRTH :</label>
            <input type="datetime-local" name="dob"><br>
            <label>Colour:</label>
            <input type="color" name="colour"><br>
            <label>File:</label>
            <input type="file" name="file"><br>
            
        </form>
    </main>
    <footer>
        <button type="submit">Submit</button>
    </footer>
    </div>
</body>
</html>
